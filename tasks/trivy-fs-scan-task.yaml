apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-fs-scan-task
spec:
  workspaces:
    # - name: source
    - name: trivy-cache   # optional cache workspace

  params:
    - name: severity
      type: string
      default: "CRITICAL,HIGH"

  steps:
    - name: trivy-scan
      image: aquasec/trivy:latest
      # workingDir: /workspace/source
      env:
        - name: TRIVY_CACHE_DIR
          value: /workspace/trivy-cache
      script: |
        #!/bin/sh
        set -e

        echo "Starting Trivy filesystem scan..."
        echo "Using Trivy cache: $TRIVY_CACHE_DIR"

        trivy fs \
          --severity $(params.severity) \
          --exit-code 1 \
          --no-progress \
          .

        echo "✅ Trivy filesystem scan completed"