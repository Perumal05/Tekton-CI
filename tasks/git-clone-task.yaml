apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone-task
spec:
  params:
    - name: repo-url
      type: string
    - name: git-revision
      type: string

  workspaces:
    - name: output

  steps:
    - name: clone
      image: alpine/git:latest
      script: |
        #!/bin/sh
        set -e

        echo "Cloning repository..."

        git clone $(params.repo-url) /workspace/output

        cd /workspace/output
        git checkout $(params.git-revision)

        echo "Repository cloned successfully."