apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: container-scan-task
  namespace: java-pipeline
spec:
  workspaces:
    # - name: source
    - name: trivy-cache   # <- declare cache workspace

  params:
    - name: image_temp_repo
      type: string
    - name: image_tag
      type: string
    - name: severity
      type: string
      default: "CRITICAL,HIGH"

  steps:
    - name: trivy-scan
      image: aquasec/trivy:0.50.0
      # workingDir: /workspace/source
      env:
        - name: TRIVY_CACHE_DIR
          value: /workspace/trivy-cache
      script: |
        #!/bin/sh
        set -e

        IMAGE="$(params.image_temp_repo):$(params.image_tag)"
        echo "Scanning container image: $IMAGE"
        echo "Using Trivy cache: $TRIVY_CACHE_DIR"

        trivy image \
          --severity $(params.severity) \
          --ignore-unfixed \
          --vuln-type os,library \
          --scanners vuln \
          --timeout 15m \
          --exit-code 1 \
          $IMAGE

        echo "✅ Image scan completed successfully"