apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: java-ci-run
spec:
  pipelineRef:
    name: java-ci-pipeline

  params:
    - name: repo-url
      value: https://github.com/Perumal05/Java-tekton-test-app.git

    - name: git-revision
      value: main

    - name: image_repo
      value: perumal1804/springboot-app

    - name: image_temp_repo
      value: perumal1804/springboot-temporary

    - name: severity
      value: "CRITICAL"

  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi